async function loadGiftTraits(prefix, col){
  const sm=document.getElementById(prefix+'rmodel'), sb=document.getElementById(prefix+'rback'), sp=document.getElementById(prefix+'rpat');
  if(!sm&&!sb&&!sp) return;            // not the gift form
  if(!col||!col.slug){ [sm,sb,sp].forEach(s=>fillTraitSelect(s,[])); return; }
  const loadTxt=S.lang==='ru'?'загрузка…':'loading…';
  [sm,sb,sp].forEach(s=>{ if(s){ s.innerHTML='<option value="">'+loadTxt+'</option>'; s.disabled=true; } });
  const slug=col.slug; let data=TRAITS_CACHE[slug];
  if(!data){
    try{
      const base='https://api.changes.tg/';
      const px=proxyURL();
      const tfUrl=px?(px.replace(/\/+$/,'')+'/?traitfloors='+encodeURIComponent(slug)):null;
      const [m,b,p,tf]=await Promise.all([
        fetch(base+'models/'+slug).then(r=>r.json()).catch(()=>[]),
        fetch(base+'backdrops/'+slug).then(r=>r.json()).catch(()=>[]),
        fetch(base+'symbols/'+slug).then(r=>r.json()).catch(()=>[]),
        tfUrl?fetch(tfUrl).then(r=>r.json()).catch(()=>null):Promise.resolve(null)
      ]);
      // real per-trait floors + listing counts -> {nameLower:floor}, {nameLower:supply}
      const fm={},fb={},fp={}, qm={},qb={},qp={};
      try{
        const node=tf&&tf.traits&&tf.traits.collections&&tf.traits.collections[slug];
        const put=(map,qmap,list)=>{ (list||[]).forEach(o=>{ const v=parseFloat(o.floor_price); if(o.name&&v>0){ const k=String(o.name).toLowerCase(); map[k]=v; qmap[k]=parseInt(o.supply,10)||0; } }); };
        if(node){ put(fm,qm,node.models); put(fb,qb,node.backdrops); put(fp,qp,node.symbols); }
      }catch(e){}
      data={ m:Array.isArray(m)?m:[], b:Array.isArray(b)?b:[], p:Array.isArray(p)?p:[], fm,fb,fp, qm,qb,qp };
      try{ const F0=(col.floor>0?col.floor:100); const pts=[];
        const addP=(arr,fmap)=>{ (arr||[]).forEach(o=>{ const nm=String(o.name||'').toLowerCase(); const fl=fmap[nm]||0; const sh=(o.rarityPermille!=null?o.rarityPermille/1000:(o.rarity||0)); if(fl>0&&sh>0) pts.push({share:sh,floor:fl}); }); };

  const cur=document.getElementById(prefix+'col'); if(cur && cur.value!==col.id) return;
  fillTraitSelect(document.getElementById(prefix+'rmodel'), data.m, data.fm, data.qm);
  fillTraitSelect(document.getElementById(prefix+'rback'), data.b, data.fb, data.qb);
  fillTraitSelect(document.getElementById(prefix+'rpat'),  data.p, data.fp, data.qp);
  ['rmodel','rback','rpat'].forEach(function(k){ try{ updateTraitBtn(prefix,k); }catch(e){} });
}

function countUp(id, target){
  const el=document.getElementById(id); if(!el) return;
  el._ct=target;            // latest target — a running loop ends here (prevents stale overwrite)
  if(el._ctRun) return;     // already animating; it will pick up the new target
  el._ctRun=true; const dur=620, t0=performance.now();
  const step=(now)=>{ const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
    el.textContent=fmtTON(Math.round(el._ct*e));
    if(p<1) requestAnimationFrame(step); else { el.textContent=fmtTON(el._ct); el._ctRun=false; } };
  requestAnimationFrame(step);
}

function submitGuess(){
  if(!game||game.locked) return;
  const guess=parseFloat(document.getElementById('gGuess').value.replace(/[^\d.]/g,''));
  const real=game.cur.priceTON;
  const fb=document.getElementById('gFeedback');
  if(isNaN(guess)||guess<=0){ fb.className='g-fb'; fb.textContent='—'; return; }
  const ratio=guess>real?guess/real:real/guess;
  let pts=0, msg='', cls='up';
  if(ratio<=1.15){ pts=100; msg=t('gPerfect'); beep('perfect'); }
  else if(ratio<=1.5){ pts=70; msg=t('gClose'); beep('good'); }
  else if(ratio<=2.2){ pts=40; msg=t('gOk'); beep('good'); }
  else if(ratio<=4){ pts=15; msg=t('gFar'); cls='up'; beep('meh'); }
  else { pts=0; msg=t('gMiss'); cls='down'; beep('bad'); if(game.mode==='chal'){pts=-50;} }
  game.score+=pts;
  fb.className='g-fb '+cls;
  fb.innerHTML=msg+' '+(pts>=0?'+':'')+pts+' <span style="color:var(--txt-3);font-weight:600">('+fmtTON(real)+' TON)</span>';
  game.locked=true;
  setTimeout(()=>{ if(!game)return; game.locked=false; nextQuestion(); renderGame(); },950);
}
function endGame(){
  clearInterval(game.timer);
  const mode=game.mode, sc=Math.max(0,game.score);
  const prevBest=S.best[mode];
  const isBest=sc>prevBest; if(isBest){ S.best[mode]=sc; save(); }
  let unlocked=false;
  if(mode==='chal' && sc>=700 && !S.premium){ grantPremium('game',true); unlocked=true; }
  if(sc>=500) beep('fanfare');
  document.getElementById('gamePanel').innerHTML=
    '<div class="g-over-card"><div class="sheen"></div>'+
      '<div class="lbl">'+t('gOver')+'</div>'+
      '<div class="big">'+sc+'</div>'+
      '<div class="best">'+t('gBest')+' '+S.best[mode]+'</div>'+
      (isBest?'<div class="nb">🏆 '+t('gNewBest')+'</div>':'')+
    '</div>'+
    (unlocked?'<div class="g-unlock">👑 '+t('gUnlock')+'</div>':'')+
    '<button class="btn" onclick="buildGameIntro()">'+t('gAgain')+'</button>';
  game=null;
}

/* ---- sound (Web Audio API) ---- */
let actx=null;
function beep(type){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const seq={ perfect:[[880,0,.09],[1320,.08,.12]], good:[[660,0,.1]], meh:[[440,0,.1]], bad:[[160,0,.18]],
      fanfare:[[523,0,.12],[659,.12,.12],[784,.24,.12],[1047,.36,.22]], tick:[[1200,0,.03]] }[type];
    if(!seq)return;
    seq.forEach(([f,d,len])=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type=type==='bad'?'sawtooth':'triangle'; o.frequency.value=f;
      o.connect(g); g.connect(actx.destination);
      const ts=actx.currentTime+d; g.gain.setValueAtTime(.0001,ts);
      g.gain.exponentialRampToValueAtTime(.18,ts+.01); g.gain.exponentialRampToValueAtTime(.0001,ts+len);
      o.start(ts); o.stop(ts+len+.02);
    });
  }catch(e){}
}

function drawSeal(x,cx,cy,R){ const c='#B89A4E'; x.save(); x.strokeStyle=c; x.fillStyle=c;
  x.lineWidth=3; x.beginPath(); x.arc(cx,cy,R,0,Math.PI*2); x.stroke();
  x.lineWidth=1.4; x.setLineDash([2,6]); x.beginPath(); x.arc(cx,cy,R-11,0,Math.PI*2); x.stroke(); x.setLineDash([]);
  const txt='·   MONET   ·   ОЦЕНОЧНЫЙ ДОМ   ·   EST. 2026   '; x.font='600 18px "Fraunces", serif'; x.textAlign='center'; x.textBaseline='middle';
  const rt=R-26, n=txt.length; for(let i=0;i<n;i++){ const ang=(i/n)*Math.PI*2 - Math.PI/2; x.save();
    x.translate(cx+Math.cos(ang)*rt, cy+Math.sin(ang)*rt); x.rotate(ang+Math.PI/2); x.fillText(txt[i],0,0); x.restore(); }
  const W=R*0.6, H=R*0.62; x.lineWidth=7; x.lineCap='round'; x.lineJoin='round'; x.beginPath();
  x.moveTo(cx-W,cy+H); x.lineTo(cx-W,cy-H); x.lineTo(cx,cy+H*0.25); x.lineTo(cx+W,cy-H); x.lineTo(cx+W,cy+H); x.stroke();
  const d=R*0.12, dy=cy+H*0.55; x.beginPath(); x.moveTo(cx,dy-d); x.lineTo(cx+d,dy); x.lineTo(cx,dy+d); x.lineTo(cx-d,dy); x.closePath(); x.fill();
  x.restore(); }

      s:[['None',60],['Bowtie',26],['Honey',12],['Crown',2]] },

      b:[['Void',30,'#15151c'],['Nebula',18,'#4b2e6b'],['Comet',8,'#3f6fa3'],['Supernova',2,'#e7a13c']],

  const RU=()=>S.lang==='ru';
  let cur=null, sel={m:null,b:null,s:null}, reqId=0;
  function has(name){ return !!TRAITS[name]; }
  function colFloor(name){ const c=COLLECTIONS.gifts.find(x=>x.n===name); return c?c.floor:0; }
  function supplyOf(name){ try{ const m=Object.values(MK.data()).flat().find(x=>x.name===name); return (m&&m.supply)||100000; }catch(e){ return 100000; } }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function grp(n){ n=Math.round(n); return n>=1000?n.toLocaleString('en-US').replace(/,/g,' '):String(n); }
  function rarity(){ const parts=[]; const T=TRAITS[cur];
    if(sel.m){ const x=T.m.find(t=>t[0]===sel.m); if(x) parts.push(x[1]/100); }
    if(sel.b){ const x=T.b.find(t=>t[0]===sel.b); if(x) parts.push(x[1]/100); }
    if(sel.s){ const x=T.s.find(t=>t[0]===sel.s); if(x) parts.push(x[1]/100); }
    if(!parts.length) return null;
    let p=1; parts.forEach(v=>p*=v); let oneIn=Math.min(supplyOf(cur),Math.max(2,Math.round(1/p)));
    const L=[[20,RU()?'Обычная':'Common','#9AA4B2'],[200,RU()?'Нечастая':'Uncommon','#22A35B'],[2000,RU()?'Редкая':'Rare','#3B82F6'],[20000,RU()?'Эпическая':'Epic','#8B5CF6'],[1e9,RU()?'Легендарная':'Legendary','#F59E0B']];

        :'<span class="rone">'+(RU()?'Выбери трейты для оценки редкости':'Pick traits to gauge rarity')+'</span>')+'</div>'+
      '<div class="mb-grid" style="margin-top:13px">'+
        '<div class="mb-cell"><span class="k">'+(RU()?'Оценка':'Estimate')+'</span><span class="v">'+fmtP(fv.val)+'</span></div>'+

      '<div class="mk-lots" id="vf-lots" style="margin-top:14px"></div>';

  function lookup(){ const box=document.getElementById('vf-lots'); if(!box) return; const url=proxyURL(); const my=++reqId;
    if(!url){ box.innerHTML='<div class="lots-h">'+(RU()?'На рынке сейчас':'On the market')+'</div><div class="lots-note">'+(RU()?'Живые листинги по площадкам временно недоступны.':'Live cross-market listings are temporarily unavailable.')+'</div>'; return; }

  function coin(it,p,k){ const fs=Math.round(p.s*0.5);
    const img = it.img ? '<img class="gimg" src="'+it.img+'" referrerpolicy="no-referrer" loading="lazy" decoding="async" onerror="this.remove()">' : '';
    return '<div class="onb-fl'+(p.b?' back':'')+'" style="top:'+p.t+';left:'+p.l+';width:'+p.s+'px;height:'+p.s+'px;background:radial-gradient(circle at 35% 28%, '+it.c+', '+it.c+'cc 60%, '+it.c+'88);animation-delay:'+p.d+'s,'+(k*0.06)+'s"><span style="font-size:'+fs+'px;line-height:1">'+it.e+'</span>'+img+'</div>'; }
  function pill(it,p,k){ const cls=p.b?' back':'';
    const inner = it.k==='u' ? '<span class="pu">'+it.t+'</span>'
      : '<span class="p8">+888</span><span class="pn">'+it.t+'</span>';
    return '<div class="onb-pill'+(it.k==='n'?' num':'')+cls+'" style="top:'+p.t+';left:'+p.l+';animation-delay:'+p.d+'s,'+(k*0.06)+'s">'+inner+'</div>'; }
  function floaters(list){ return list.map((it,k)=>{ const p=POS[k%POS.length];
    return it.k==='g' ? coin(it,p,k) : pill(it,p,k); }).join(''); }
  function decor(c1,c2,c3){ return '<div class="onb-blob onb-b1" style="background:'+c1+'"></div><div class="onb-blob onb-b2" style="background:'+c2+'"></div><div class="onb-blob onb-b3" style="background:'+c3+'"></div>'; }
  const FSLUG={'🧸':'toybear','🎩':'tophat','💎':'astralshard','🌹':'eternalrose','🔮':'magicpotion','💍':'signetring','👑':'durovscap','🦋':'lootbag','🪙':'swisswatch','🪅':'genielamp'};
  const FIMG=(e)=>{ const s=FSLUG[e]; return s?('https://nft.fragment.com/gift/'+s+'-1.medium.jpg'):''; };
  const G=(e,c)=>({k:'g',e,c,img:FIMG(e)}), U=(t)=>({k:'u',t}), Nm=(t)=>({k:'n',t});
  function heroes(ru){ return [
    '<div class="onb-logo">'+sealSVG()+'</div><div class="onb-cl">'+(ru?'оценщик активов Telegram':'Telegram asset appraiser')+'</div>',
    '<div class="onb-badge">≈ 165<span class="u">TON</span></div>',
    '<div class="onb-chips"><div class="onb-chip"><span class="cl">Portals</span><span class="cv">190</span></div><span class="onb-vs">VS</span><div class="onb-chip win"><span class="cl">Fragment</span><span class="cv">165</span><span class="cw">'+(ru?'дешевле':'cheapest')+'</span></div></div>',
    '<div class="onb-nw"><div class="l">'+(ru?'Твой капитал':'Net worth')+'</div><div class="v">12 480 <span style="font-size:.5em;opacity:.8">TON</span></div><div class="t">🥇 Elite</div></div>'
  ]; }
  function slides(){ const ru=S.lang==='ru'; const H=heroes(ru); return [
    {bg:'s0', kr:(ru?'01 · ОЦЕНОЧНЫЙ ДОМ':'01 · APPRAISAL HOUSE'), dc:['#43A87C','#2E7D5E','#7FE0B4'], hero:H[0],
      fl:[G('🧸','#E86FA6'),U('@durov'),G('💎','#6B8BE8'),Nm('0142'),G('🌹','#E05670'),G('👑','#D9A441'),U('@nft'),G('🔮','#A06BE8'),G('🦋','#3FA9C2'),Nm('8888'),G('🪅','#E07FB0'),U('@gift')],
      t:ru?'Твой Telegram-капитал начинается здесь':'Your Telegram capital starts here', s:ru?'Оцени gifts, usernames и +888-номера по рыночным данным.':'Value gifts, usernames and +888 numbers on real market data.'},
    {bg:'s1', kr:(ru?'02 · ОЦЕНКА':'02 · APPRAISAL'), dc:['#D9A441','#C8A24B','#F0D27A'], hero:H[1],
      fl:[G('💎','#6B8BE8'),G('💍','#D9A441'),U('@whale'),G('🔮','#A06BE8'),Nm('0007'),G('🧸','#E86FA6'),G('🎩','#46B27E'),U('@crypto'),G('🪙','#D9A441'),G('🌹','#E05670'),Nm('1337'),G('👑','#D9A441')],
      t:ru?'Узнай цену за секунды':'Know the price in seconds', s:ru?'Получай диапазон, уверенность и причины оценки.':'Get a range, confidence and the reasons behind it.'},
    {bg:'s2', kr:(ru?'03 · РЫНОК':'03 · MARKET'), dc:['#2F9EA8','#2F7E86','#7FD8E0'], hero:H[2],
      fl:[G('🦋','#3FA9C2'),G('💎','#6B8BE8'),U('@durov'),G('🌹','#E05670'),Nm('0142'),G('🎩','#46B27E'),G('🪅','#E07FB0'),U('@monet'),G('🔮','#A06BE8'),G('🪙','#D9A441'),Nm('8888'),G('🧸','#E86FA6')],
      t:ru?'Покупай не дороже рынка':'Never overpay the market', s:ru?'Сравниваем площадки и показываем, где актив дешевле.':'We compare marketplaces and show where an asset is cheaper.'},
    {bg:'s3', kr:(ru?'04 · КАПИТАЛ':'04 · CAPITAL'), dc:['#43A87C','#3A7D63','#7FE0B4'], hero:H[3],
      fl:[G('👑','#D9A441'),G('🧸','#E86FA6'),U('@durov'),G('🪙','#D9A441'),Nm('0007'),G('💎','#6B8BE8'),G('🦋','#3FA9C2'),U('@nft'),G('🌹','#E05670'),G('🎩','#46B27E'),Nm('1337'),G('🔮','#A06BE8')],
      t:ru?'Собери свой портфель':'Build your portfolio', s:ru?'Следи за капиталом, статусом и движением рынка в TON.':'Track your capital, status and the market — in TON.'}
  ]; }
  function render(){ const ru=S.lang==='ru'; const sl=slides(); const last=i===N-1;
    const cards=sl.map(s=>'<div class="onb-slide '+s.bg+'"><div class="onb-stage"><div class="onb-bg"></div>'+decor(s.dc[0],s.dc[1],s.dc[2])+'<div class="onb-stars"></div><div class="onb-ring"></div>'+floaters(s.fl)+'<div class="onb-center">'+s.hero+'</div></div><div class="onb-cap"><div class="onb-kicker">'+s.kr+'</div><h2>'+s.t+'</h2><p>'+s.s+'</p></div></div>').join('');
    const dots=sl.map((_,k)=>'<span class="onb-dot'+(k===i?' on':'')+'"></span>').join('');
    const back=i>0?'<button class="onb-btn gho" onclick="ONB.goto('+(i-1)+')">'+(ru?'Назад':'Back')+'</button>':'';
    document.getElementById('onb').innerHTML=
      '<button class="onb-skip" onclick="ONB.finish()">'+(ru?'Пропустить':'Skip')+'</button>'+
      '<div class="onb-viewport"><div class="onb-track" id="onb-track" style="transform:translateX(-'+(i*100)+'%)">'+cards+'</div></div>'+
      '<div class="onb-ctl"><div class="onb-dots">'+dots+'</div><div class="onb-row">'+back+
        '<button class="onb-btn pri" onclick="'+(last?'ONB.startEval()':'ONB.next()')+'">'+(last?(ru?'Оценить первый актив':'Value your first asset'):(ru?'Далее':'Next'))+'</button></div></div>';
    bindSwipe();
  }
  function bindSwipe(){ const vp=document.getElementById('onb-track'); if(!vp) return; let x0=null;
    vp.ontouchstart=e=>{ x0=e.touches[0].clientX; };
    vp.ontouchend=e=>{ if(x0==null)return; const dx=e.changedTouches[0].clientX-x0; x0=null;
      if(dx<-40&&i<N-1) goto(i+1); else if(dx>40&&i>0) goto(i-1); };
  }
  function open(){ i=0; const el=document.getElementById('onb'); if(!el) return; el.style.display='flex'; render(); }
  function next(){ if(i<N-1){ i++; render(); if(tg&&tg.HapticFeedback){try{tg.HapticFeedback.selectionChanged();}catch(e){}} } else finish(); }
  function goto(k){ i=Math.max(0,Math.min(N-1,k)); render(); }
  function startEval(){ finish(); setTimeout(function(){ try{ if(typeof setView==='function') setView('evaluate'); var m=document.getElementById('e_main'); if(m){ m.focus(); m.scrollIntoView({behavior:'smooth',block:'center'}); } }catch(e){} },430); }
  function openRealCard(){ try{finish();}catch(e){} setTimeout(function(){ try{ if(window.BANK) BANK.openCard(); }catch(e){} },400); }
  function finish(){ S.onboarded=true; S.onbVer=14; save(); const el=document.getElementById('onb'); if(!el)return; el.style.opacity='0'; setTimeout(()=>{ el.style.display='none'; el.style.opacity=''; },350); if(tg&&tg.HapticFeedback){try{tg.HapticFeedback.impactOccurred('medium');}catch(e){}} }
  return { open, next, goto, finish, openRealCard, startEval };
})();
function initTelegram(){
  if(!tg) return;
  try{
    tg.ready(); tg.expand();
    try{ if(tg.disableVerticalSwipes) tg.disableVerticalSwipes(); }catch(e){}   /* stop the app from being dragged/shifted */
    try{ if(tg.isVerticalSwipesEnabled!==undefined) tg.isVerticalSwipesEnabled=false; }catch(e){}
    try{ applyTheme(); }catch(e){}
    if(tg.CloudStorage){
      tg.CloudStorage.getItem('monet',(err,val)=>{ if(!err && val && !lsGet('monet')){ try{ Object.assign(S,JSON.parse(val)); if(!S.themeSet) S.theme='dark'; setLang(S.lang); applyTheme(); }catch(e){} } });
    }
  }catch(e){}
}
function init(){
  if(!S.themeSet) S.theme='dark';
  applyTheme();
  document.getElementById('langRu').classList.toggle('on',S.lang==='ru');
  document.getElementById('langEn').classList.toggle('on',S.lang==='en');
  document.documentElement.lang=S.lang;
  applyI18N();
  renderCatTabs('catTabs',curCat,pickCat);
  renderCatTabs('catTabsCmp',curCatCmp,pickCatCmp);
  loadFloorCache();
  buildEvaluateInput();
  setEvalMode('single');
  if(window.PF) window.PF.init();
  if(window.BANK) window.BANK.checkin();
  updatePremiumUI();
  updateHeroRate();
  renderDrawer();   /* populate the menu/sidebar (profile + lists) on load */
  try{ document.querySelectorAll('.drnav-item[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===curView)); }catch(e){}
  initTelegram();
  refreshRate();
  updateFloorBadge(); refreshFloors(false);
  if(window.ONB && (S.onbVer||0) < 14) ONB.open();   // first-launch onboarding (once)
}
init();
</script>
